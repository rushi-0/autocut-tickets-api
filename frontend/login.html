<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | Autocut Tickets</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>Autocut Tickets</h1>
          <div class="hint">Sign in to raise a ticket</div>
        </div>
      </div>
      <a href="register.html" class="hint">Need an account? Register</a>
    </div>

    <div class="card" style="max-width: 560px; margin: 0 auto;">
      <div class="grid">
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" />
        </div>

        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Your password" />
        </div>

        <div>
          <div class="actions">
            <button id="btnLogin" class="btn primary" type="button">Login</button>
            <span id="loading" class="hint" style="display:none">Please wait…</span>
          </div>
          <div id="msg" class="msg" style="margin-top:12px"></div>
        </div>
      </div>
    </div>

    <div class="footer">After login, you’ll be redirected to ticket raising.</div>
  </div>

  <script type="module">
    import { api } from './api.js';
    import { getToken, setToken, setMsg } from './app.js';

    const btn = document.getElementById('btnLogin');
    const loading = document.getElementById('loading');
    const msg = document.getElementById('msg');

    // If already logged in, skip to ticket page
    if(getToken()){
      window.location.href = 'raise-ticket.html';
    }

    btn.addEventListener('click', async () => {
      setMsg(msg, { type: 'success', text: '' });

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if(!email || !password){
        setMsg(msg, { type: 'error', text: 'Enter email and password.' });
        return;
      }

      btn.disabled = true;
      loading.style.display = 'inline';

      try{
        const data = await api.login({ email, password });
        if(!data?.token) throw new Error('Token missing in response.');
        setToken(data.token);
        setMsg(msg, { type: 'success', text: 'Login successful. Redirecting…' });
        setTimeout(() => {
          window.location.href = 'raise-ticket.html';
        }, 700);
      }catch(err){
        setMsg(msg, { type: 'error', text: err.message || 'Login failed.' });
      }finally{
        btn.disabled = false;
        loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
