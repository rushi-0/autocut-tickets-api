<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register | Autocut Tickets</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>Autocut Tickets</h1>
          <div class="hint">Create your account</div>
        </div>
      </div>
      <a href="login.html" class="hint">Already have an account? Login</a>
    </div>

    <div class="card" style="max-width: 560px; margin: 0 auto;">
      <div class="grid">
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" autocomplete="name" placeholder="Your name" />
        </div>

        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" />
        </div>

        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="new-password" placeholder="Create a password" />
        </div>

        <div>
          <div class="actions">
            <button id="btnRegister" class="btn primary" type="button">Register</button>
            <span id="loading" class="hint" style="display:none">Please wait…</span>
          </div>
          <div id="msg" class="msg" style="margin-top:12px"></div>
        </div>

        <div class="hint">
          Default role is <b>user</b>. Admin/staff role changes happen only via the backend.
        </div>
      </div>
    </div>

    <div class="footer">Backend: <span class="hint">http://localhost:6000</span></div>
  </div>

  <script type="module">
    import { api } from './api.js';
    import { setMsg } from './app.js';

    const btn = document.getElementById('btnRegister');
    const loading = document.getElementById('loading');
    const msg = document.getElementById('msg');

    btn.addEventListener('click', async () => {
      setMsg(msg, { type: 'success', text: '' });

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if(!name || !email || !password){
        setMsg(msg, { type: 'error', text: 'Please fill name, email, and password.' });
        return;
      }

      btn.disabled = true;
      loading.style.display = 'inline';

      try{
        const data = await api.register({ name, email, password });
        setMsg(msg, { type: 'success', text: data?.message || 'Registered successfully.' });
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 900);
      }catch(err){
        setMsg(msg, { type: 'error', text: err.message || 'Registration failed.' });
      }finally{
        btn.disabled = false;
        loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
